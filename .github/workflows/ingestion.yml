name: Ride The Trends Ingestion

on:
  schedule:
    # Runs at the start of every hour (UTC)
    - cron: '0 * * * *'
  workflow_dispatch: 
    # Allows you to manually trigger this from the GitHub Actions UI

jobs:
  ingest_and_process:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up subsequent runs by caching dependencies

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ingestion Worker
        # This block maps your encrypted GitHub Secrets to Environment Variables
        env:
          HOT_DB_URL: ${{ secrets.HOT_DB_URL }}
          COLD_DB_URL: ${{ secrets.COLD_DB_URL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
          EMBEDDING_MODEL_NAME: "all-MiniLM-L6-v2"
        run: python -m data_ingestion.worker
